<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Babel — Tower of Babel</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0604;color:#e8ddd0;display:flex;justify-content:center;align-items:center;min-height:100vh;min-height:100dvh;user-select:none;overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
#game{width:100vw;height:100vh;height:100dvh;max-width:100vw;max-height:100dvh;display:flex;flex-direction:column;background:linear-gradient(135deg,#120a06,#0d0704);overflow:hidden;position:relative;font-size:16px}

/* ── TOP BAR ── */
#bar{padding:3px 8px;background:linear-gradient(180deg,#1a0e08,#0d0704);border-bottom:1px solid #2a180e;flex-shrink:0;z-index:10}
#bar-top{display:flex;justify-content:space-between;align-items:center;gap:6px}
#bar-top h1{font-size:15px;font-weight:800;color:#e8c87a;letter-spacing:1px;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
#bar-top h1 span{color:#d4a04a}
#bar-top .st{display:flex;gap:6px;font-size:12px;color:#7a5a3a;flex-wrap:wrap;align-items:center}
#bar-top .st b{color:#e8ddd0}
#bar-top .st .gold{color:#ffd700}
#bar-top .st .hgt{color:#70b0d0}

/* ── XP BARS ── General on top, 3 skills in a 2x container below */
#xp-strip{flex-shrink:0;background:rgba(0,0,0,0.25);border-bottom:1px solid #1a0e08;padding:2px 6px;display:flex;flex-direction:column;gap:2px}
#xp-general{flex-shrink:0}
#xp-general .xpr{display:flex;align-items:center;gap:4px;height:14px;padding:0 4px}
#xp-skills{flex:1;min-height:0;display:flex;flex-direction:column;gap:1px;padding:0}
#xp-skills .xpr{display:flex;align-items:center;gap:4px;padding:0 4px;flex:1;min-height:0;transition:flex 0.3s ease}
.xpr .xlb{font-size:9px;font-weight:700;width:18px;text-align:center;flex-shrink:0}
.xpr .xn{font-size:9px;font-weight:600;width:58px;flex-shrink:0;color:#8a7a6a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.xpr .xbarw{flex:1;height:4px;background:#0a0604;border-radius:2px;overflow:hidden;min-width:10px;position:relative}
.xpr .xbarw .xf{height:100%;border-radius:2px;transition:width 0.3s ease;position:absolute;left:0;top:0;width:0%}
.xpr .xbarw .xfo{height:100%;border-radius:2px;position:absolute;left:0;top:0;width:0%;transition:width 0.4s ease,opacity 0.5s ease;opacity:0}
.xpr .xbarw .xfo.sh{opacity:1}
.xpr .xlv{font-size:9px;font-weight:700;width:14px;text-align:right;flex-shrink:0}

/* ── TABS ── */
#tabs{display:flex;background:#0a0604;border-bottom:2px solid #2a180e;flex-shrink:0;z-index:10;overflow-x:auto}
#tabs .t{flex:1;padding:9px 6px;background:none;color:#5a3a2a;border:none;cursor:pointer;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;transition:all 0.1s;border-bottom:3px solid transparent;font-family:inherit;white-space:nowrap;min-width:0}
#tabs .t:hover{color:#d4a04a}
#tabs .t.on{color:#e8c87a;border-bottom-color:#e8c87a;background:rgba(232,200,122,0.04)}

/* ── CONTENT ── */
#content{flex:1;position:relative;min-height:0;overflow:hidden}
.pane{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch;background:radial-gradient(ellipse at 50% 0%, #150c08 0%, #0a0604 100%)}
.pane.on{display:flex}
.pane::-webkit-scrollbar{width:3px}.pane::-webkit-scrollbar-track{background:#0a0604}.pane::-webkit-scrollbar-thumb{background:#2a180e;border-radius:3px}

.g-res{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:4px 6px;flex-shrink:0}
.g-res .r{background:rgba(15,10,6,0.8);border:1px solid #1a0e08;border-radius:4px;padding:4px 5px;display:flex;justify-content:space-between;align-items:center;font-size:12px}
.g-res .r .i{font-size:16px}.g-res .r .n{flex:1;font-size:11px;color:#8a6a4a;margin-left:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.g-res .r .v{font-weight:700;font-size:13px;color:#e8ddd0}.g-res .r.glow{border-color:#5a3a1a;background:rgba(30,18,8,0.9)}
.g-res .r .ps{font-size:9px;color:#4a6a3a}.g-res .r.locked{opacity:0.2}

#gather-zone,.czone{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:10px;cursor:pointer;min-height:50px;position:relative}
#gather-zone:active,.czone:active{background:rgba(255,255,255,0.01)}
#gather-zone .big-icon,.czone .big-icon{font-size:44px;margin-bottom:2px;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5))}
#gather-zone .hint,.czone .hint{font-size:17px;font-weight:700;color:#e8c87a;text-shadow:0 1px 4px rgba(0,0,0,0.4)}
#gather-zone .sub,.czone .sub{font-size:12px;color:#8a6a4a;margin-top:2px}

.feed{position:absolute;font-weight:700;pointer-events:none;animation:feedUp 0.8s ease forwards;z-index:20;text-align:center;line-height:1}
.feed .l1{display:block;font-size:17px;margin-bottom:2px}.feed .l2{display:block;font-size:12px}
@keyframes feedUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.08)}}

/* ── UPGRADES (shared tap & auto sections) ── */
.g-upgs,.c-upgs,.a-upgs{padding:3px 6px;flex-shrink:0;overflow-y:auto;max-height:30%}
.g-upgs{border-top:1px solid #1a0e08}
.c-upgs{border-top:1px solid #1a0e08;margin-top:2px}
.a-upgs{border-top:1px solid #2a2010;background:rgba(10,8,6,0.3)}
.g-upgs .uh,.c-upgs .uh,.a-upgs .uh{font-size:9px;text-transform:uppercase;letter-spacing:0.5px;margin:3px 0 2px;display:block}
.g-upgs .uh,.c-upgs .uh{color:#4a3a2a}
.a-upgs .uh{color:#5a6a3a;font-weight:700;text-shadow:0 0 6px rgba(80,180,50,0.08)}
.g-upgs .u,.c-upgs .u,.a-upgs .u{display:flex;justify-content:space-between;align-items:center;padding:3px 5px;margin-bottom:1px;background:rgba(0,0,0,0.2);border-radius:3px;font-size:11px}
.a-upgs .u{border-left:2px solid #5a8a3a;background:rgba(20,40,10,0.2)}
.g-upgs .u .d,.c-upgs .u .d,.a-upgs .u .d{flex:1;min-width:0}
.g-upgs .u .d .nm,.c-upgs .u .d .nm,.a-upgs .u .d .nm{font-weight:600;font-size:11px}
.g-upgs .u .d .dc,.c-upgs .u .d .dc,.a-upgs .u .d .dc{font-size:9px;color:#6a5a4a}
.g-upgs .u .co,.c-upgs .u .co,.a-upgs .u .co{font-size:10px;color:#ffd700;margin:0 3px;white-space:nowrap}
.g-upgs .u button,.c-upgs .u button,.a-upgs .u button{font-size:9px;padding:3px 6px;font-family:inherit;background:linear-gradient(135deg,#3a2010,#5a3018);color:#e8ddd0;border:1px solid #6a3820;border-radius:3px;cursor:pointer;white-space:nowrap}
.a-upgs .u button{background:linear-gradient(135deg,#1a3a10,#2a5a18);border-color:#3a6a28}
.g-upgs .u button:disabled,.c-upgs .u button:disabled,.a-upgs .u button:disabled{opacity:0.3;cursor:not-allowed}

/* ── CRAFT ── */
.c-recipes{padding:3px 6px;flex-shrink:0}
.c-recipes .ch{font-size:10px;text-transform:uppercase;color:#4a3a2a;margin:2px 0;display:block}
.c-recipes .cr{display:grid;grid-template-columns:repeat(4,1fr);gap:2px}
.c-recipes .cr .ci{background:rgba(15,10,6,0.6);border:1px solid #1a0e08;border-radius:4px;padding:4px 3px;text-align:center;cursor:pointer;transition:all 0.1s;font-size:11px}
.c-recipes .cr .ci:hover{border-color:#3a2a1a}.c-recipes .cr .ci.on{border-color:#e8c87a;background:rgba(232,200,122,0.04)}
.c-recipes .cr .ci .cn{font-size:9px;color:#6a5a4a}.c-recipes .cr .ci.locked{opacity:0.2;cursor:default}

.cbar{width:80%;max-width:240px;height:10px;background:#0a0604;border-radius:5px;overflow:hidden;margin:3px auto;border:1px solid #2a180e;position:relative}
.cbar .cf{height:100%;background:linear-gradient(90deg,#c46a3a,#e8a050);border-radius:4px;transition:width 0.05s;position:absolute;left:0;top:0}

/* ── BUILD ── */
#build-pane canvas{display:block;width:100%;height:100%}
.bhud{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(0deg,rgba(10,6,4,0.97) 0%,rgba(10,6,4,0.85) 80%,transparent 100%);padding:6px 8px 8px;z-index:5;gap:3px;display:flex;flex-direction:column}
.bhud .sn{font-size:12px;font-weight:700;color:#e8c87a;text-shadow:0 1px 3px rgba(0,0,0,0.5)}
.bhud .pt{font-size:11px;color:#8a7a6a;display:flex;gap:10px}
.bhud .pt span{color:#e8ddd0}
.bhud .stab{height:5px;background:#0a0604;border-radius:3px;overflow:hidden;border:1px solid #1a0e08}
.bhud .stab .sf{height:100%;border-radius:2px;transition:width 0.3s;position:relative}
.bhud .ah{font-size:11px;color:#c0a070}
.row{display:flex;gap:2px;flex-wrap:wrap}.row .dot{width:5px;height:5px;border-radius:1px;background:#1a0e08;border:1px solid #2a180e}
.row .dot.done{background:#c46a3a;border-color:#e8a050}.row .dot.crack{background:#cc3030;border-color:#cc5050;animation:pulse 0.3s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 2px rgba(255,215,0,0.3)}50%{box-shadow:0 0 4px rgba(255,215,0,0.5)}}
#fb{position:absolute;bottom:48px;right:6px;z-index:6;font-size:12px;padding:5px 12px;background:linear-gradient(135deg,#3a2010,#5a3018);color:#e8c87a;border:1px solid #6a3820;border-radius:5px;cursor:pointer;font-family:inherit;font-weight:700;box-shadow:0 2px 8px rgba(0,0,0,0.5)}
#fb:active{transform:scale(0.95)}
#tower-tech{position:absolute;top:4px;right:4px;z-index:6}
#tower-tech button{background:rgba(10,6,4,0.85);border:1px solid #2a180e;border-radius:4px;padding:3px 6px;cursor:pointer;font-size:11px;color:#8a6a4a;font-family:inherit}
#tower-tech button:hover{color:#e8c87a;border-color:#e8c87a}
#ttech-panel{position:absolute;top:24px;right:4px;z-index:6;width:200px;background:rgba(10,6,4,0.96);border:1px solid #2a180e;border-radius:5px;padding:5px;display:none;backdrop-filter:blur(4px);max-height:60%;overflow-y:auto}
#ttech-panel.sh{display:block}
#ttech-panel .tu{display:flex;justify-content:space-between;align-items:center;padding:4px 5px;margin-bottom:2px;border-radius:3px;font-size:11px}
#ttech-panel .tu:hover{background:rgba(255,255,255,0.02)}#ttech-panel .tu .td{flex:1;min-width:0}
#ttech-panel .tu .td .tnm{font-weight:600;font-size:11px}#ttech-panel .tu .td .tdc{font-size:9px;color:#6a5a4a}
#ttech-panel .tu .tco{font-size:10px;color:#ffd700;margin:0 3px;white-space:nowrap}
#ttech-panel .tu button{font-size:9px;padding:2px 5px;font-family:inherit;background:linear-gradient(135deg,#3a2010,#5a3018);color:#e8ddd0;border:1px solid #6a3820;border-radius:3px;cursor:pointer;white-space:nowrap}
#ttech-panel .tu button:disabled{opacity:0.3;cursor:not-allowed}#ttech-panel .tuh{font-size:9px;text-transform:uppercase;color:#4a3a2a;margin:2px 0 2px;border-top:1px solid #1a0e08;padding-top:2px}

.sk-scroll{padding:5px;flex:1;overflow-y:auto}
.sk{background:rgba(15,10,6,0.6);border:1px solid #1a0e08;border-radius:4px;padding:4px 7px;margin-bottom:3px}
.sk .shdr{display:flex;justify-content:space-between;align-items:center}
.sk .shdr .sn{font-weight:700;font-size:13px}.sk .shdr .sl{font-size:11px;font-weight:600}
.sk .sbar{height:4px;background:#0a0604;border-radius:2px;margin:2px 0;overflow:hidden}
.sk .sbar .sf{height:100%;border-radius:2px;transition:width 0.2s}.sk .sxp{font-size:10px;color:#6a5a4a}

.ms-sec{margin:5px 0;padding:5px;border-radius:4px;background:rgba(15,10,6,0.4)}
.ms-sec .msh{font-size:12px;font-weight:700;margin-bottom:2px;display:flex;justify-content:space-between}
.ms-sec .msh span{font-size:10px;color:#6a5a4a}
.ms-sec .msg{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:2px}
.ms-sec .msg .m{background:rgba(10,6,4,0.6);border:1px solid #1a0e08;border-radius:4px;padding:3px 4px;text-align:center;font-size:10px;cursor:pointer;transition:all 0.12s}
.ms-sec .msg .m:hover{border-color:#3a2a1a}.ms-sec .msg .m.unlocked{border-color:#3a5a3a;background:rgba(10,20,10,0.4)}
.ms-sec .msg .m.next{border-color:#ffd700;box-shadow:0 0 4px rgba(255,215,0,0.1)}
.ms-sec .msg .m .ml{font-size:12px;font-weight:800;color:#e8c87a}.ms-sec .msg .m .md{font-size:9px;color:#6a5a4a;line-height:1.2}
.ms-sec .msg .m .mb{font-size:9px;color:#4a7a4a}

.su{background:rgba(15,10,6,0.5);border-radius:4px;padding:4px;margin-top:4px}
.su h{font-size:10px;text-transform:uppercase;color:#4a3a2a;margin:2px 0 2px;display:block}
.su .u{display:flex;justify-content:space-between;align-items:center;padding:4px 5px;margin-bottom:2px;font-size:11px;background:rgba(0,0,0,0.2);border-radius:3px}
.su .u .d{flex:1;min-width:0}.su .u .d .nm{font-weight:600;font-size:11px}.su .u .d .dc{font-size:9px;color:#6a5a4a}
.su .u .co{font-size:10px;color:#ffd700;margin:0 3px;white-space:nowrap}
.su .u button{font-size:9px;padding:3px 6px;font-family:inherit;background:linear-gradient(135deg,#3a2010,#5a3018);color:#e8ddd0;border:1px solid #6a3820;border-radius:3px;cursor:pointer;white-space:nowrap}
.su .u button:disabled{opacity:0.3;cursor:not-allowed}

.t-scroll{padding:5px;flex:1;overflow-y:auto}.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:3px}
.parapet{border:1px solid #1a0e08;border-radius:5px;padding:4px;background:rgba(15,10,6,0.6)}
.parapet .phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.parapet .phdr .pn{font-size:12px;font-weight:700}.parapet .phdr .pl{font-size:10px;font-weight:600}
.parapet .pdesc{font-size:9px;color:#6a5a4a;margin-bottom:2px}.parapet .pbar{height:3px;background:#0a0604;border-radius:2px;overflow:hidden;margin-bottom:2px}
.parapet .pbar .pf{height:100%;background:linear-gradient(90deg,#e8c87a,#ffd700);border-radius:2px;transition:width 0.2s}
.parapet .peff{font-size:9px;color:#8a7a6a;margin-bottom:2px}
.parapet button{width:100%;font-size:10px;padding:3px;font-family:inherit;background:linear-gradient(135deg,#3a2010,#5a3018);color:#e8ddd0;border:1px solid #6a3820;border-radius:3px;cursor:pointer}
.parapet button:disabled{opacity:0.3;cursor:not-allowed}
#notif{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(10,6,4,0.95);border:1px solid #ffd700;border-radius:6px;padding:5px 12px;color:#e8c87a;font-weight:600;font-size:12px;text-align:center;max-width:250px;opacity:0;transition:opacity 0.12s;pointer-events:none;box-shadow:0 3px 12px rgba(0,0,0,0.6)}
#notif.sh{opacity:1}.prtcl{position:fixed;pointer-events:none;font-size:10px;animation:prtclFade 0.4s ease forwards;z-index:50}
@keyframes prtclFade{0%{opacity:1;transform:translateY(0) scale(0.5)}100%{opacity:0;transform:translateY(-30px) scale(1.2)}}
@media(min-width:768px){#game{width:480px;height:800px;border-radius:12px;border:1px solid #2a180e;box-shadow:0 8px 40px rgba(0,0,0,0.8)}}
</style>
</head>
<body>
<div id="game">
  <div id="bar">
    <div id="bar-top">
      <h1>🗼 <span>BABEL</span></h1>
      <div class="st">
        <span class="gold">🪙<b id="st-gold">0</b></span>
        <span>🧱<b id="st-bricks">0</b></span>
        <span class="hgt">🗼<b id="st-hgt">0</b></span>
      </div>
    </div>
    <div id="xp-strip">
      <div id="xp-general">
        <div class="xpr"><span class="xlb" style="color:#e0d0c0">⚡</span><span class="xn">General</span><div class="xbarw"><div class="xf" id="xpf-x" style="width:0%;background:#e0d0c0"></div><div class="xfo" id="xfo-x" style="background:#e0d0c0"></div></div><span class="xlv" id="xlv-x" style="color:#e0d0c0">1</span></div>
      </div>
      <div id="xp-skills">
        <div class="xpr" id="xp-g"><span class="xlb" style="color:#d06040">⛏️</span><span class="xn">Gather</span><div class="xbarw"><div class="xf" id="xpf-g" style="width:0%;background:#d06040"></div><div class="xfo" id="xfo-g" style="background:#d06040"></div></div><span class="xlv" id="xlv-g" style="color:#d06040">1</span></div>
        <div class="xpr" id="xp-c"><span class="xlb" style="color:#50b050">🔨</span><span class="xn">Craft</span><div class="xbarw"><div class="xf" id="xpf-c" style="width:0%;background:#50b050"></div><div class="xfo" id="xfo-c" style="background:#50b050"></div></div><span class="xlv" id="xlv-c" style="color:#50b050">1</span></div>
        <div class="xpr" id="xp-b"><span class="xlb" style="color:#5090d0">🧱</span><span class="xn">Build</span><div class="xbarw"><div class="xf" id="xpf-b" style="width:0%;background:#5090d0"></div><div class="xfo" id="xfo-b" style="background:#5090d0"></div></div><span class="xlv" id="xlv-b" style="color:#5090d0">1</span></div>
      </div>
    </div>
  </div>
  <div id="tabs">
    <button class="t on" data-t="gather">⛏️ Gather</button>
    <button class="t" data-t="craft">🔨 Craft</button>
    <button class="t" data-t="build">🗼 Build</button>
    <button class="t" data-t="skills">⚡ Skills</button>
    <button class="t" data-t="talents">🏰 Talents</button>
  </div>
  <div id="content">
    <div class="pane on" id="gather-pane">
      <div class="g-res" id="g-res"></div>
      <div id="gather-zone">
        <div class="big-icon" id="g-icon">🟤</div>
        <div class="hint" id="g-hint">Tap to gather Mud</div>
        <div class="sub" id="g-sub">+1 per tap</div>
      </div>
      <div class="g-upgs" id="g-upgs"></div>
      <div class="a-upgs" id="g-auto-upgs"></div>
    </div>
    <div class="pane" id="craft-pane">
      <div class="c-recipes" id="c-recipes" style="margin-top:2px"></div>
      <div id="craft-zone">
        <div class="big-icon" id="c-icon">🧱</div>
        <div class="hint" id="c-hint">Tap to craft</div>
        <div class="sub" id="c-sub">Select a recipe</div>
        <div class="cbar" id="c-bar" style="display:none"><div class="cf" id="c-fill" style="width:0%"></div></div>
      </div>
      <div class="c-upgs" id="c-upgs"></div>
      <div class="a-upgs" id="c-auto-upgs"></div>
    </div>
    <div class="pane" id="build-pane">
      <canvas id="bc"></canvas>
      <button id="fb" onclick="G.tapBuild()">🧱 Place</button>
      <div id="tower-tech"><button onclick="G.toggleTech()">⬆️</button></div>
      <div id="ttech-panel"></div>
      <div class="bhud">
        <div class="sn" id="bhud-name">🗼 Tower of Babel</div>
        <div class="pt" id="bhud-progress">H:0 W:3</div>
        <div class="stab" id="stab-bar"><div class="sf" id="stab-fill" style="width:100%;background:#40a040"></div></div>
        <div class="ah" id="bhud-action">👉 Tap <span class="tc">0/4</span></div>
        <div class="row" id="bhud-row"></div>
      </div>
    </div>
    <div class="pane" id="skills-pane">
      <div class="sk-scroll">
        <div id="skills-list"></div>
        <div id="milestones-area"></div>
        <div id="skill-upgs-area" class="su"></div>
      </div>
    </div>
    <div class="pane" id="talents-pane">
      <div class="t-scroll">
        <div class="tg" id="talents-grid"></div>
      </div>
    </div>
  </div>
</div>
<div id="notif"></div>

// ─── STATE HELPERS ────────────────────────────────────────────────────

function uL(id){return S.upg[id]||0}
function tL(id){return S.tal[id]||0}
function msG(id){return S.ms[id]||0}
function skLv(id){return S.sk[id]?.lv||1}
function xpN(lv){return Math.floor(50*lv*(1+lv*0.12))}
function aL(id){return S.auto[id]||0}

function rC(id){const s=S.sk[id];let l=1,x=s.xp;while(x>=xpN(l)){x-=xpN(l);l++}s.lv=l}

// ─── XP OVERLAY & BARS ───────────────────────────────────────────────

const SKILL_IDS=['gathering','crafting','building'];
const SKILL_COLS={'gathering':GAT_COL,'crafting':CRA_COL,'building':BLD_COL,'general':GXP_COL};
const XP_FO=['xfo-g','xfo-c','xfo-b'];
const XP_XF=['xpf-g','xpf-c','xpf-b'];
const XP_IDS=['xp-g','xp-c','xp-b'];
let xpOverlayTimer=null;
let currentBoostedSkill=null;

function triggerXpOverlay(skill){
  if(!skill||skill==='general')return;
  const s=S.sk[skill];if(!s)return;
  const nx=xpN(s.lv);const pct=Math.min(100,Math.floor((s.xp||0)/nx*100));
  const col=SKILL_COLS[skill]||GXP_COL;

  // Show overlay on all 3 skill bars
  for(let i=0;i<3;i++){
    const fo=document.getElementById(XP_FO[i]);
    if(fo){fo.style.width=pct+'%';fo.style.background=col;fo.classList.add('sh')}
  }

  // Grow the boosted bar, shrink others
  currentBoostedSkill=skill;
  for(let i=0;i<3;i++){
    const el=document.getElementById(XP_IDS[i]);
    if(el)el.style.flex=(SKILL_IDS[i]===skill?'4':'1');
  }

  clearTimeout(xpOverlayTimer);
  xpOverlayTimer=setTimeout(()=>{
    // Fade overlay
    for(let i=0;i<3;i++){
      const fo=document.getElementById(XP_FO[i]);
      if(fo)fo.classList.remove('sh');
    }
    // Restore equal flex
    for(let i=0;i<3;i++){
      const el=document.getElementById(XP_IDS[i]);
      if(el)el.style.flex='1';
    }
    currentBoostedSkill=null;
    // After fade, restore actual levels
    setTimeout(()=>updateXPBars(),500);
  },1200);
}

function updateXPBars(){
  SKILL_IDS.forEach((id,i)=>{
    const s=S.sk[id];if(!s)return;
    const nx=xpN(s.lv);const pct=Math.min(100,Math.floor((s.xp||0)/nx*100));
    const col=SKILL_COLS[id];
    const f=document.getElementById(XP_XF[i]);
    if(f){f.style.width=pct+'%';f.style.background=col}
  });
  // General bar
  const gs=S.sk.general;if(gs){
    const gnx=xpN(gs.lv);const gpct=Math.min(100,Math.floor((gs.xp||0)/gnx*100));
    const gf=document.getElementById('xpf-x');
    if(gf)gf.style.width=gpct+'%';
    const gl=document.getElementById('xlv-x');
    if(gl)gl.textContent=gs.lv;
  }
  // Update skill levels in XP strip
  SKILL_IDS.forEach((id,i)=>{
    const el=document.getElementById('xlv-'+id.charAt(0));
    if(el)el.textContent=S.sk[id].lv;
  });
}

// ─── EARNING ──────────────────────────────────────────────────────────

function earnX(sk,base){
  let m=1;
  if(msG("general")>=2)m*=2;
  if(msG("general")>=8)m*=4;
  if(sk==="gathering"){const v=uL("sg1");if(v>0)m*=1+v}
  if(sk==="crafting"){const v=uL("sc1");if(v>0)m*=1+v}
  if(sk==="building"){const v=uL("sb1");if(v>0)m*=1+v}
  if(tL('d1')>0)m*=1+tL('d1')*0.15;
  const x=Math.floor(base*m);
  if(sk==='general'){S.sk.general.xp+=x;rC('general')}
  else{S.sk[sk].xp+=x;rC(sk);S.sk.general.xp+=Math.floor(x*0.5);rC('general')}
  updateXPBars();
  setTimeout(()=>triggerXpOverlay(sk),50);
}

// ─── GATHER ───────────────────────────────────────────────────────────

function gF(){const l=skLv('gathering');return RES_ALL.filter(r=>r.unlock<=l)[0]||RES_ALL[0]}

function gather(id){
  const r=RES_ALL.find(x=>x.id===id);if(!r)return;
  let base=r.y;let m=1;let g=1;
  if(msG('gathering')>=1)g=Math.max(1,Math.floor(g*3));
  if(msG('gathering')>=5)g=Math.max(1,Math.floor(g*10));
  if(msG('gathering')>=9)g=Math.max(1,Math.floor(g*25));
  UPG_R.forEach(u=>{const l=uL(u.id);if(l>0)m+=u.v*l});
  if(tL('t3')>0)m+=tL('t3')*0.08;
  const amount=Math.max(1,Math.floor(base*(1+m)));
  S.res[id]=(S.res[id]||0)+amount;
  const gAmt=Math.max(1,Math.floor(g*(1+uL('g1')*0.5+uL('g2')*1+uL('g3')*2+uL('g4')*4)));
  S.stat.gold=(S.stat.gold||0)+gAmt;
  S.stat.totalClicks=(S.stat.totalClicks||0)+1;
  earnX('gathering',1);
  showFeed(GAT_COL,RES_COL,GOLD_COL,'+'+amount+'R','+'+gAmt+'🪙','+1⛏️XP','+'+(Math.floor(1*0.5))+'⚡XP');
  updateUI();
}

// ─── CRAFT ────────────────────────────────────────────────────────────

function autoCraft(){
  const goodMats=unlockedMat().filter(m=>m.id!=='mortar');
  const avail=goodMats.filter(m=>{const r=m.r;for(const[k,v]of Object.entries(r))if((S.res[k]||0)<v)return false;return true});
  if(!avail.length){
    // Try mortar if no other craft possible
    const mort=MAT_ALL.find(m=>m.id==='mortar');
    if(mort){const r=mort.r;for(const[k,v]of Object.entries(r))if((S.res[k]||0)<v)return null;return mort}
    return null
  }
  const sel=S._selCraft?avail.find(m=>m.id===S._selCraft):null;
  if(sel)return sel;
  const best=avail.reduce((a,b)=>MAT_ALL.indexOf(a)>MAT_ALL.indexOf(b)?a:b);
  S._selCraft=best.id;return best
}

function craft(mat){
  if(!mat)return;
  const r=mat.r;
  for(const[k,v]of Object.entries(r)){if((S.res[k]||0)<v)return}
  let b=1;
  if(msG('crafting')>=1)b=Math.max(1,Math.floor(b*3));
  if(msG('crafting')>=5)b=Math.max(1,Math.floor(b*10));
  if(msG('crafting')>=9)b=Math.max(1,Math.floor(b*25));
  let save=0;if(tL('t3')>0)save=Math.min(0.5,tL('t3')*0.08);
  for(const[k,v]of Object.entries(r)){S.res[k]-=v;if(save>0&&Math.random()<save)S.res[k]+=1}
  let amount=b;
  S.mat[mat.id]=(S.mat[mat.id]||0)+amount;
  const g=Math.max(1,Math.floor(mat.t*(1+uL('c1')*0.5+uL('c2')*1+uL('c3')*2+uL('c4')*4)));
  S.stat.gold=(S.stat.gold||0)+g;
  S.stat.totalClicks=(S.stat.totalClicks||0)+1;
  earnX('crafting',2);
  showFeed(CRA_COL,RES_COL,GOLD_COL,'+'+amount+mat.i,'+'+g+'🪙','+2🔨XP','+'+(Math.floor(2*0.5))+'⚡XP');
  updateUI();
}

function unlockedRes(){const l=skLv('gathering');return RES_ALL.filter(r=>r.unlock<=l)}
function unlockedMat(){const l=skLv('crafting');return MAT_ALL.filter(m=>m.unlock<=l)}

// ─── BUILD ────────────────────────────────────────────────────────────

function getBaseW(){let w=3;[null,'bw1','bw2','bw3','bw4','bw5'].forEach(t=>{if(t&&S.tech[t])w=S.tech[t]});return w}
function getReinf(){let b=0;['rf1','rf2','rf3','rf4','rf5'].forEach(id=>{if(S.tech[id])b+=TECH.find(t=>t.id===id).val});
  b*=1+tL('f1')*0.1;
  if(msG('gathering')>=4||msG('crafting')>=4||msG('building')>=4||msG('general')>=4)b+=0.2;
  if(msG('gathering')>=8||msG('crafting')>=8||msG('building')>=8||msG('general')>=8)b+=0.3;return b}
function getFound(){let m=1;['fd1','fd2','fd3'].forEach(id=>{if(S.tech[id])m+=TECH.find(t=>t.id===id).val});return m}
function getMatStr(){const m=MAT_ALL.find(x=>x.id===getMatId());return m?m.str:1.0}
function getStab(){const h=S.tower.rows.length;if(h===0)return{s:100,p:100,m:1};
  const bw=getBaseW(),ri=getReinf(),fd=getFound(),ms=getMatStr();
  const maxSafe=bw*5+25+ri*30+fd*10;if(maxSafe<=0)return{s:0,p:0,m:1};
  const p=Math.max(0,Math.min(100,100-((h/maxSafe)*100)));
  const hp=Math.max(0.1,1-p/100);
  const c=hp*hp*1.2;let cc=false;
  if(Math.random()<c/300)cc=true;
  return{s:p,p:p,m:ms*(1+ri)}}
function getMatId(){const l=skLv('crafting');if(l>=18)return'megalith';if(l>=12)return'glazedBrick';if(l>=8)return'reinfBrick';if(l>=6)return'stoneBlock';if(l>=3)return'firedBrick';return'mudBrick'}
function bT(){return 4-Math.min(3,skLv('building')*0.1)}
function mT(){return 5-Math.min(4,skLv('building')*0.1)}

let buildPhase=0,slotIdx=0,rowPhase=0,mPhase=0;

function initTower(){S.tower.rows=[];S.tower._coll=false;
  const bw=getBaseW();const row={bricks:[]};
  for(let i=0;i<bw;i++)row.bricks.push({st:'e'});
  S.tower.rows.push(row);
  slotIdx=0;buildPhase=0;rowPhase=0;mPhase=0;
}

function tapBuild(){
  if(S.tower._coll){notif('💥 Collapsed! Rebuild?');initTower();updateUI();return}
  const mat=getMatId();if(!mat||!(S.mat[mat]||0)||!(S.mat.mortar||0)){notif('Need '+(MAT_ALL.find(m=>m.id===mat)?.n||mat)+' & Mortar!');return}
  const bw=getBaseW();
  let rows=S.tower.rows;if(!rows.length)rows.push({bricks:[]});
  let row=rows[rows.length-1];
  if(row.bricks.length>=bw){
    const st=getStab();
    if(st.p<=0||(st.p<5&&Math.random()<0.05)){
      S.tower._coll=true;notif('💥 TOWER COLLAPSED!');
      S.stat.gold=(S.stat.gold||0)+Math.floor(Math.max(10,rows.length*5));
      updateUI();return
    }
    rows.push({bricks:[]});row=rows[rows.length-1];slotIdx=0;buildPhase=0;rowPhase=0;mPhase=0
  }
  S.mat[mat]=(S.mat[mat]||0)-1;S.mat.mortar=(S.mat.mortar||0)-1;
  S.stat.taps=(S.stat.taps||0)+1;
  S.stat.totalClicks=(S.stat.totalClicks||0)+1;
  S.stat.gold=(S.stat.gold||0)+Math.floor(Math.random()*3+1);
  const rowFill=row.bricks.length;
  const brick={st:'p',pr:0};
  row.bricks.push(brick);
  slotIdx=row.bricks.length-1;
  earnX('building',2);
  showFeed(BLD_COL,RES_COL,GOLD_COL,'+1🧱','+'+(Math.floor(Math.random()*3+1))+'🪙','+2🧱XP','+'+(Math.floor(2*0.5))+'⚡XP');
  row.bricks[slotIdx].st='d';
  updateUI();
}

// ─── UPGRADES & TECH ─────────────────────────────────────────────────

function buyUpg(id){
  const allU=[...UPG_G,...UPG_R,...UPG_S,...UPG_A];const u=allU.find(x=>x.id===id);if(!u)return;
  const l=uL(u.id);if(l>=u.L)return;
  const c=Math.floor(u.c*Math.pow(u.m,l));if((S.stat.gold||0)<c)return;
  S.stat.gold-=c;S.upg[id]=(S.upg[id]||0)+1;
  // Auto upgrades also update S.auto for tick logic
  if(UPG_A.find(x=>x.id===id)){S.auto[u.sk]=(S.auto[u.sk]||0)+1}
  notif('🔧 '+u.n+' Lv.'+(l+1));updateUI()
}

function buyTech(id){
  const t=TECH.find(x=>x.id===id);if(!t)return;
  if(S.tech[id]){notif('Already owned');return}
  if((S.stat.gold||0)<t.cost)return;
  S.stat.gold-=t.cost;S.tech[id]=t.val;
  notif('⬆️ '+t.n);updateUI()
}
function buyMs(skill,i){
  if(msG(skill)>i)return;
  const track=MS[skill];
  if(i>=track.length)return;
  if(skLv(skill)<track[i].lv)return;
  S.ms[skill]=i+1;
  notif('🏆 '+track[i].n+'!');updateUI()
}
function buyTalent(id){
  const t=TALENTS.find(x=>x.id===id);if(!t)return;
  const l=tL(t.id);if(l>=t.L)return;
  const rs=t.rS||'general';const rl=t.rL+(t.rS2||0)*l;
  if(skLv(rs)<rl){notif('Need '+rs+' Lv'+rl);return}
  const c=Math.floor(t.cb*Math.pow(t.cm,l));
  if((S.stat.gold||0)<c)return;
  S.stat.gold-=c;S.tal[id]=(S.tal[id]||0)+1;
  notif('🏰 '+t.n+' Lv.'+(l+1));updateUI()
}

const ca=document.getElementById('bc'),cx=ca.getContext('2d');let cW=0,cH=0,rP=false;
function rC2(){const p=document.getElementById('build-pane'),r=p.getBoundingClientRect();if(r.w<10||r.h<10){rP=true;return}
  const d=window.devicePixelRatio||1;ca.width=r.width*d;ca.height=r.height*d;cW=r.width;cH=r.height;ca.style.width=r.width+'px';ca.style.height=r.height+'px';rP=false}
function draw(){
  const d=window.devicePixelRatio||1;cx.setTransform(d,0,0,d,0,0);
  if(cW<20||cH<20){if(rP||cW<20)rC2();if(cW<20||cH<20)return}
  const w=cW,h=cH;
  const g=cx.createLinearGradient(0,0,0,h);g.addColorStop(0,'#080504');g.addColorStop(0.3,'#120a06');g.addColorStop(0.7,'#1a0e08');g.addColorStop(1,'#0a0604');
  cx.fillStyle=g;cx.fillRect(0,0,w,h);
  if(S.tower.rows.length>10){cx.fillStyle='rgba(255,255,240,0.06)';for(let i=0;i<25;i++){const x=(i*131+47)%w,y=(i*89+11)%(h*0.2);cx.beginPath();cx.arc(x,y,0.3,0,Math.PI*2);cx.fill()}}
  cx.fillStyle='#0a0604';cx.fillRect(0,h-24,w,24);cx.fillStyle='#1a0e08';cx.fillRect(0,h-24,w,1.2);
  const rows=S.tower.rows,bw=getBaseW();
  if(!rows||!rows.length){cx.fillStyle='rgba(255,255,255,0.04)';cx.font='14px sans-serif';cx.textAlign='center';cx.fillText('Tap to start!',w/2,h/2-10);return}
  const maxDrawH=h-28,totalSlots=Math.max(rows.length,5);
  const bH=Math.min(10,Math.max(3.5,(maxDrawH/totalSlots)*0.55)),gap=1,mH=Math.max(0.8,bH*0.18),rowH=bH+mH;
  const bW=Math.min(28,Math.max(6,(w-20)/(bw+0.5)));const wallW=bw*bW+(bw-1)*gap,ox=(w-wallW)/2;
  const cols=BC[getMatId()]||BC.mudBrick,mCols=BC.mortar;
  const startRow=Math.max(0,rows.length-Math.floor(maxDrawH/rowH));
  for(let ri=startRow;ri<rows.length;ri++){const row=rows[ri],y=h-26-(rows.length-ri)*rowH;if(y<-rowH||y>h)continue;
    for(let b=0;b<bw;b++){const bx=ox+b*(bW+gap);if(bx+bW<0||bx>w)continue;const brick=row.bricks[b]||{st:'e'};const st=getStab();
      if(brick.st==='d'){const g2=cx.createLinearGradient(bx,y,bx,y+bH);g2.addColorStop(0,cols.s);g2.addColorStop(0.5,cols.m);g2.addColorStop(1,cols.e);
        cx.fillStyle=g2;cx.fillRect(bx,y,bW,bH);cx.strokeStyle='rgba(0,0,0,0.12)';cx.lineWidth=0.2;cx.strokeRect(bx,y,bW,bH);
        if(st.p<15&&(b+ri)%3===0){cx.strokeStyle='rgba(200,50,50,'+(0.1+(15-st.p)/15*0.3)+')';cx.lineWidth=0.3;
          cx.beginPath();cx.moveTo(bx+1,y+1);cx.lineTo(bx+bW-1,y+bH-1);cx.moveTo(bx+bW-1,y+1);cx.lineTo(bx+1,y+bH-1);cx.stroke()}
      }else if(brick.st==='p'){const f=Math.min(1,(brick.pr||0)/bT());cx.globalAlpha=0.06;cx.fillStyle='rgba(255,255,255,0.05)';cx.fillRect(bx,y,bW,bH);cx.globalAlpha=1;
        const sl=y-(1-f)*10;cx.shadowColor='rgba(232,200,122,0.06)';cx.shadowBlur=2;
        const g2=cx.createLinearGradient(bx,sl,bx,sl+bH);g2.addColorStop(0,cols.s);g2.addColorStop(0.5,cols.m);g2.addColorStop(1,cols.e);
        cx.fillStyle=g2;cx.fillRect(bx,sl,bW,bH);cx.shadowBlur=0
      }else if(brick.st==='m'){const g2=cx.createLinearGradient(bx,y,bx,y+bH);g2.addColorStop(0,cols.s);g2.addColorStop(0.5,cols.m);g2.addColorStop(1,cols.e);
        cx.fillStyle=g2;cx.fillRect(bx,y,bW,bH);cx.strokeStyle='rgba(0,0,0,0.12)';cx.lineWidth=0.2;cx.strokeRect(bx,y,bW,bH);
        const mf=Math.min(1,(brick.mp||0)/mT());cx.fillStyle='rgba(180,160,130,'+(0.08+0.2*mf)+')';cx.fillRect(bx,y-mH,bW,mH)
      }else{cx.strokeStyle='rgba(255,255,255,0.02)';cx.lineWidth=0.2;cx.strokeRect(bx,y,bW,bH)}}
    if(ri<rows.length-1){cx.fillStyle=mCols.m;cx.fillRect(ox,y+bH,wallW,mH)}}
  cx.fillStyle='#2a1508';cx.fillRect(ox-3,h-26,wallW+6,2);
  const st=getStab();if(st.p<20){const sw=(20-st.p)*0.15*Math.sin(Date.now()/350);cx.save();cx.translate(sw,0);
    cx.fillStyle='rgba(200,100,50,0.04)';cx.fillRect(ox-2,h-26-wallW*0.12,wallW+4,24);cx.restore()}
}

function getAutoInterval(id){
  const levels=[0,3,1.5,0.75,0.4,0.2];
  const l=Math.min(aL(id),levels.length-1);
  return (levels[l]||0.5)*1000;
}

function runAuto(){
  // Auto-gather
  if(aL('gather')>0){
    const gi=getAutoInterval('gather');
    if(S.tick%(gi/100)<1){
      const gr=gF();if(gr)gather(gr.id);
    }
  }
  // Auto-craft
  if(aL('craft')>0){
    const ci=getAutoInterval('craft');
    if(S.tick%(ci/100)<1){
      const s=autoCraft();if(s)craft(s);
    }
  }
  // Auto-build
  if(aL('build')>0){
    const bi=getAutoInterval('build');
    if(S.tick%(bi/100)<1){
      const mat=getMatId();
      if(mat&&(S.mat[mat]||0)>0&&(S.mat.mortar||0)>0){
        tapBuild();
      }
    }
  }
}

    return '<div class="parapet" style="border-color:'+(mx?'#3a5a3a':hl?'#2a180e':'#0a0604')+'"><div class="phdr"><span class="pn">'+t.i+' '+t.n+'</span><span class="pl" style="color:'+(mx?'#60a060':'#8a6a4a')+'">'+(mx?'MAX':'Lv'+l+'/'+t.L)+'</span></div>'+
      '<div class="pdesc">'+t.d+' · '+rs+' Lv'+rl+'</div><div class="pbar"><div class="pf" style="width:'+(l/t.L*100)+'%"></div></div><div class="peff">'+es+'</div>'+
      '<button onclick="G.buyTalent(\''+t.id+'\')"'+(ok&&hl?'':'disabled')+'>🪙'+c+' '+(mx?'MAXED':l>0?'Upgrade':'Unlock')+'</button></div>'}).join('');

  updateHUD();
}

function switchTab(t){document.querySelectorAll('.t').forEach(b=>b.classList.remove('on'));document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelector('.t[data-t="'+t+'"]').classList.add('on');document.getElementById(t+'-pane').classList.add('on');
  if(t==='build')requestAnimationFrame(()=>rC2())}

function save(){try{localStorage.setItem('babel_save',JSON.stringify(S))}catch(e){}}
function load(){try{const d=localStorage.getItem('babel_save');if(d){Object.assign(S,JSON.parse(d));
  if(!S.cp)S.cp={};if(!S.tech)S.tech={};if(!S.tal)S.tal={};if(!S.ms)S.ms={gathering:0,crafting:0,building:0,general:0};
  if(!S.sk)S.sk={gathering:{xp:0,lv:1},crafting:{xp:0,lv:1},building:{xp:0,lv:1},general:{xp:0,lv:1}};
  if(!S.tower)S.tower={rows:[],colCount:3,collapses:0};if(!S.tower.rows)S.tower.rows=[];if(S.tower._coll===undefined)S.tower._coll=false;
  if(!S._selCraft)S._selCraft=null;if(!S.auto)S.auto={gather:0,craft:0,build:0};return true}}catch(e){}return false}

function init(){
  document.querySelectorAll('.t').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.t)));
  document.getElementById('gather-zone').addEventListener('click',()=>gather(gF().id));
  document.getElementById('craft-zone').addEventListener('click',()=>{const s=autoCraft();if(s)craft(s)});
  ca.addEventListener('click',()=>tapBuild());
  document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
    if(e.key===' '||e.key==='Enter'){e.preventDefault();tapBuild()}
    if(e.key>='1'&&e.key<='5')switchTab(['','gather','craft','build','skills','talents'][+e.key])});
  if(!load())initTower();
  window.addEventListener('resize',()=>rC2());rC2();updateUI();
  setInterval(()=>{autoTick();runAuto();S.tick++;if(S.tick%5===0)updateUI()},100);
  setInterval(save,5000);
  (function lp(){draw();requestAnimationFrame(lp)})();
  console.log('🗼 Babel loaded!');
}
window.G={init,gather,craft,tapBuild,buyUpg,buyTech,selCraft(id){S._selCraft=id;updateUI()},buyMs(s,i){buyMs(s,i)},buyTalent,toggleTech(){document.getElementById('ttech-panel').classList.toggle('sh')}};
})();
document.addEventListener('DOMContentLoaded',()=>{G.init()});
</script>
</body>
</html>
