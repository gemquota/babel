<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Babel — Monolith Builder</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a0f0a;color:#f5e6d3;display:flex;justify-content:center;align-items:center;min-height:100vh;user-select:none;overflow:hidden;touch-action:manipulation}

#game{width:100vw;height:100vh;max-width:100vw;max-height:100vh;display:flex;flex-direction:column;background:#2a1508;overflow:hidden;position:relative}

#bar{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;background:linear-gradient(135deg,#3d2010,#1a0f0a);border-bottom:2px solid #5a3018;flex-shrink:0;gap:4px;z-index:10}
#bar h1{font-size:13px;font-weight:800;color:#e8c87a;letter-spacing:1px;white-space:nowrap}
#bar h1 span{color:#d4a04a}
#bar .st{display:flex;gap:5px;font-size:10px;color:#a08060;flex-wrap:wrap;align-items:center}
#bar .st b{color:#f5e6d3}
#bar .st .gold{color:#ffd700}
#bar .st .xl{color:#80c080;font-weight:700}

#tabs{display:flex;background:#1a0f0a;border-bottom:2px solid #5a3018;flex-shrink:0;z-index:10;overflow-x:auto}
#tabs .t{flex:0 1 auto;padding:7px 10px;background:none;color:#7a5a4a;border:none;cursor:pointer;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;transition:all 0.12s;border-bottom:3px solid transparent;font-family:inherit;white-space:nowrap}
#tabs .t:hover{color:#e8c87a;background:rgba(255,255,255,0.03)}
#tabs .t.on{color:#e8c87a;border-bottom-color:#e8c87a;background:rgba(232,200,122,0.05)}

#content{flex:1;position:relative;min-height:0;overflow:hidden}
.pane{position:absolute;inset:0;display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pane.on{display:flex}
.pane::-webkit-scrollbar{width:3px}
.pane::-webkit-scrollbar-track{background:#1a0f0a}
.pane::-webkit-scrollbar-thumb{background:#5a3018;border-radius:2px}

/* ===== GATHER ===== */
#gather-pane{background:linear-gradient(180deg,#2a1508,#1a0f0a)}
.gs{display:flex;gap:2px;padding:3px 6px;flex-shrink:0}
.gs .gl{font-size:9px;color:#80c080;background:rgba(0,0,0,0.3);padding:1px 6px;border-radius:3px;white-space:nowrap}
.g-res{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:2px;padding:4px 6px;flex-shrink:0}
.g-res .r{background:#1a0f0a;border:1px solid #3d2010;border-radius:4px;padding:3px 5px;display:flex;justify-content:space-between;align-items:center;font-size:10px}
.g-res .r .i{font-size:11px}
.g-res .r .n{flex:1;font-size:8px;color:#b09880;margin-left:2px}
.g-res .r .v{font-weight:700;font-size:12px;color:#f5e6d3}
.g-res .r.glow{border-color:#c4a040}
.g-res .r .ps{font-size:7px;color:#5a8a5a}

#gather-zone{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:12px;cursor:pointer;touch-action:manipulation;min-height:80px;transition:all 0.05s}
#gather-zone:active{background:rgba(255,255,255,0.02)}
#gather-zone .big-icon{font-size:44px;margin-bottom:4px;transition:transform 0.05s}
#gather-zone:active .big-icon{transform:scale(0.92)}
#gather-zone .hint{font-size:14px;font-weight:700;color:#e8c87a}
#gather-zone .sub{font-size:10px;color:#b09880}
#gather-zone .yield{font-size:28px;font-weight:800;color:#ffd700;opacity:0;position:absolute;transition:all 0.2s;pointer-events:none}
#gather-zone .yield.pop{opacity:1;transform:translateY(-25px)}
#gather-zone .change{position:absolute;font-weight:800;color:#ffd700;pointer-events:none;font-size:18px;animation:floatUp 0.6s ease forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.3)}}

.g-upgs{padding:4px 6px;flex-shrink:0;border-top:1px solid #3d2010;max-height:30%;overflow-y:auto}
.g-upgs .uh{font-size:8px;text-transform:uppercase;color:#5a4a3a;letter-spacing:0.5px;margin:4px 0 2px}
.g-upgs .u{display:flex;justify-content:space-between;align-items:center;background:#1a0f0a;border:1px solid #3d2010;border-radius:4px;padding:3px 5px;margin-bottom:2px;font-size:10px}
.g-upgs .u .d{flex:1;min-width:0}
.g-upgs .u .d .nm{font-weight:600;font-size:10px}
.g-upgs .u .d .dc{font-size:8px;color:#7a6a5a}
.g-upgs .u .co{font-size:9px;font-weight:600;margin:0 3px;white-space:nowrap}
.g-upgs .u button{font-size:8px;padding:2px 6px;font-family:inherit;background:linear-gradient(135deg,#5a3a1a,#7a4a2a);color:#f5e6d3;border:1px solid #906030;border-radius:3px;cursor:pointer;white-space:nowrap}
.g-upgs .u button:disabled{opacity:0.4;cursor:not-allowed}

/* ===== CRAFT ===== */
#craft-pane{background:linear-gradient(180deg,#1f1209,#150c06)}
.c-mat{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:2px;padding:4px 6px;flex-shrink:0}
.c-mat .m{background:#1a0f0a;border:1px solid #3d2010;border-radius:4px;padding:3px 5px;display:flex;justify-content:space-between;align-items:center;font-size:10px}
.c-mat .m .i{font-size:11px}
.c-mat .m .n{flex:1;font-size:8px;color:#b09880}
.c-mat .m .v{font-weight:700;font-size:12px;color:#f5e6d3}
.c-recipes{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:2px;padding:3px 6px;flex-shrink:0}
.c-recipes .rc{background:#1a0f0a;border:2px solid #3d2010;border-radius:5px;padding:4px 6px;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:10px}
.c-recipes .rc:hover{border-color:#5a3a1a}
.c-recipes .rc.on{border-color:#e8c87a;background:#22150a}
.c-recipes .rc.auto{border-color:#ffd700;box-shadow:0 0 4px rgba(255,215,0,0.2)}
.c-recipes .rc .ri{font-size:16px}
.c-recipes .rc .rn{flex:1;font-size:10px;font-weight:600}
.c-recipes .rc .rn .rr{font-size:7px;color:#7a6a5a;font-weight:400}
.c-recipes .rc .ck{font-size:8px;color:#5a8a5a;padding:1px 4px;border-radius:3px;background:rgba(90,138,90,0.12);white-space:nowrap}
#craft-zone{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:12px;cursor:pointer;touch-action:manipulation;min-height:60px}
#craft-zone:active{background:rgba(255,255,255,0.02)}
#craft-zone .big-icon{font-size:36px;margin-bottom:4px}
#craft-zone .hint{font-size:13px;font-weight:700;color:#e8c87a}
#craft-zone .sub{font-size:10px;color:#b09880}
#craft-zone .cbar{width:150px;max-width:50vw;height:4px;background:#1a0f0a;border-radius:2px;margin-top:6px;overflow:hidden}
#craft-zone .cbar .cf{height:100%;background:linear-gradient(90deg,#ffd700,#e8c87a);border-radius:2px;transition:width 0.1s}
.c-upgs{padding:4px 6px;flex-shrink:0;border-top:1px solid #3d2010;max-height:25%;overflow-y:auto}

/* ===== BUILD ===== */
#build-pane{background:#1a0f0a;padding:0;position:relative}
#build-pane canvas{display:block;width:100%;height:100%;image-rendering:auto}
#bhud{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,0.92));padding:8px 10px;pointer-events:none;z-index:5}
#bhud>*{pointer-events:auto}
#bhud .sn{font-size:12px;font-weight:700;color:#e8c87a;text-shadow:0 2px 6px rgba(0,0,0,0.9)}
#bhud .pt{font-size:9px;color:#b09880}
#bhud .ah{font-size:11px;color:#f5e6d3;background:rgba(0,0,0,0.7);padding:2px 8px;border-radius:4px;display:inline-block;margin-top:2px;border:1px solid rgba(232,200,122,0.15)}
#bhud .ah .tc{display:inline-block;width:18px;height:18px;line-height:18px;text-align:center;background:#e8c87a;color:#2c1810;border-radius:50%;font-weight:700;font-size:9px;margin:0 2px;vertical-align:middle}
#bhud .row{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;max-height:20px;overflow:hidden}
#bhud .row .dot{width:6px;height:6px;border-radius:1px;background:#3d2010;border:1px solid #5a3018;flex-shrink:0}
#bhud .row .dot.done{background:#c46a3a;border-color:#a0502d}
#bhud .row .dot.cur{background:#ffd700;border-color:#ffd700;box-shadow:0 0 4px rgba(255,215,0,0.4);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 3px rgba(255,215,0,0.3)}50%{box-shadow:0 0 6px rgba(255,215,0,0.5)}}
#bupg-toggle{position:absolute;top:4px;right:4px;z-index:6;background:rgba(26,15,10,0.85);border:1px solid #5a3018;border-radius:4px;padding:2px 6px;cursor:pointer;font-size:9px;color:#b09880;font-family:inherit}
#bupg-toggle:hover{color:#e8c87a;border-color:#e8c87a}
#bupg-panel{position:absolute;top:26px;right:4px;z-index:6;width:180px;background:rgba(26,15,10,0.95);border:1px solid #5a3018;border-radius:5px;padding:5px;display:none;backdrop-filter:blur(4px)}
#bupg-panel.sh{display:block}
#bupg-panel .bu{display:flex;justify-content:space-between;align-items:center;padding:2px 4px;margin-bottom:1px;border-radius:3px;font-size:9px}
#bupg-panel .bu:hover{background:rgba(255,255,255,0.03)}
#bupg-panel .bu .bd{flex:1;min-width:0}
#bupg-panel .bu .bd .bnm{font-weight:600;font-size:9px}
#bupg-panel .bu .bd .bdc{font-size:7px;color:#7a6a5a}
#bupg-panel .bu .bco{font-size:8px;color:#ffd700;margin:0 3px;white-space:nowrap}
#bupg-panel .bu button{font-size:7px;padding:1px 5px;font-family:inherit;background:linear-gradient(135deg,#5a3a1a,#7a4a2a);color:#f5e6d3;border:1px solid #906030;border-radius:3px;cursor:pointer;white-space:nowrap}
#bupg-panel .bu button:disabled{opacity:0.4;cursor:not-allowed}
#bsch{position:absolute;top:4px;left:4px;z-index:6;display:flex;gap:2px;flex-wrap:wrap;max-width:65%}
#bsch .bs{background:rgba(26,15,10,0.85);border:2px solid #3d2010;border-radius:4px;padding:1px 5px;cursor:pointer;font-size:8px;color:#7a6a5a;font-family:inherit;white-space:nowrap}
#bsch .bs:hover{border-color:#5a3a1a}
#bsch .bs.on{border-color:#e8c87a;color:#e8c87a;background:rgba(232,200,122,0.08)}
#bsch .bs.lk{opacity:0.3;cursor:not-allowed}

/* ===== SKILLS ===== */
#skills-pane{background:linear-gradient(180deg,#1a150a,#0f0f0a)}
.skills-scroll{padding:6px;flex:1;overflow-y:auto}
.skills-scroll::-webkit-scrollbar{width:3px}
.skills-scroll::-webkit-scrollbar-track{background:#1a0f0a}
.skills-scroll::-webkit-scrollbar-thumb{background:#5a3018}
.sk{background:#1a0f0a;border:1px solid #3d2010;border-radius:5px;padding:5px 8px;margin-bottom:4px}
.sk .shdr{display:flex;justify-content:space-between;align-items:center}
.sk .shdr .sn{font-weight:700;font-size:11px}
.sk .shdr .sl{color:#80c080;font-size:10px;font-weight:600}
.sk .sbar{height:4px;background:#0a0505;border-radius:2px;margin:3px 0;overflow:hidden}
.sk .sbar .sf{height:100%;background:linear-gradient(90deg,#80c080,#40a040);border-radius:2px;transition:width 0.2s}
.sk .sxp{font-size:8px;color:#7a6a5a}

/* milestones */
.ms{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:3px;margin-bottom:6px}
.m{background:#1a0f0a;border:2px solid #3d2010;border-radius:5px;padding:4px 6px;text-align:center}
.m.unlocked{border-color:#80c080;background:#0a1a0a}
.m.next{border-color:#ffd700;box-shadow:0 0 4px rgba(255,215,0,0.2)}
.m.locked{opacity:0.4}
.m .ml{font-size:16px;font-weight:800;color:#e8c87a}
.m .md{font-size:8px;color:#7a6a5a;margin-top:2px}
.m .mb{font-size:8px;color:#5a8a5a;margin-top:2px}

/* skill+general upgs */
.su h{font-size:9px;text-transform:uppercase;color:#5a4a3a;letter-spacing:0.5px;margin:4px 0 2px;display:block}
.su .u{display:flex;justify-content:space-between;align-items:center;background:#1a0f0a;border:1px solid #3d2010;border-radius:4px;padding:3px 5px;margin-bottom:2px;font-size:10px}
.su .u .d{flex:1;min-width:0}
.su .u .d .nm{font-weight:600;font-size:10px}
.su .u .d .dc{font-size:8px;color:#7a6a5a}
.su .u .co{font-size:9px;font-weight:600;margin:0 3px;white-space:nowrap}
.su .u button{font-size:8px;padding:2px 6px;font-family:inherit;background:linear-gradient(135deg,#5a3a1a,#7a4a2a);color:#f5e6d3;border:1px solid #906030;border-radius:3px;cursor:pointer;white-space:nowrap}
.su .u button:disabled{opacity:0.4;cursor:not-allowed}

/* ===== TALENTS ===== */
#talents-pane{background:linear-gradient(180deg,#0f150f,#0a0f0a)}
.talents-scroll{padding:6px;flex:1;overflow-y:auto}
.talents-scroll::-webkit-scrollbar{width:3px}
.talents-scroll::-webkit-scrollbar-track{background:#1a0f0a}
.talents-scroll::-webkit-scrollbar-thumb{background:#5a3018}
.talents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:4px;padding:2px}
.parapet{border:2px solid #3d2010;border-radius:6px;padding:5px;background:#1a0f0a}
.parapet .phdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.parapet .phdr .pn{font-size:10px;font-weight:700}
.parapet .phdr .pl{font-size:9px;color:#80c080;font-weight:600}
.parapet .pdesc{font-size:8px;color:#7a6a5a;margin-bottom:3px}
.parapet .pbar{height:3px;background:#0a0505;border-radius:2px;overflow:hidden;margin-bottom:3px}
.parapet .pbar .pf{height:100%;background:linear-gradient(90deg,#e8c87a,#ffd700);border-radius:2px;transition:width 0.2s}
.parapet .peff{font-size:8px;color:#b09880;margin-bottom:2px}
.parapet button{width:100%;font-size:9px;padding:3px;font-family:inherit;background:linear-gradient(135deg,#5a3a1a,#7a4a2a);color:#f5e6d3;border:1px solid #906030;border-radius:4px;cursor:pointer}
.parapet button:disabled{opacity:0.4;cursor:not-allowed}

/* notif */
#notif{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:100;background:#1a0f0a;border:2px solid #ffd700;border-radius:6px;padding:5px 14px;color:#f5e6d3;font-weight:600;font-size:11px;text-align:center;max-width:300px;opacity:0;transition:opacity 0.15s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.6)}
#notif.sh{opacity:1}

/* particles */
.prtcl{position:fixed;pointer-events:none;font-size:14px;animation:prtclFade 0.5s ease forwards;z-index:50}
@keyframes prtclFade{0%{opacity:1;transform:translateY(0) scale(0.5)}100%{opacity:0;transform:translateY(-50px) scale(1.2)}}

@media(min-width:768px){
  #game{width:820px;height:700px;border-radius:12px;border:2px solid #5a3018;box-shadow:0 8px 50px rgba(0,0,0,0.7)}
}
</style>
</head>
<body>
<div id="game">
  <div id="bar">
    <h1>🗼 <span>BABEL</span></h1>
    <div class="st">
      <span class="gold">🪙<b id="st-gold">0</b></span>
      <span>🧱<b id="st-bricks">0</b></span>
      <span class="xl">⚡<b id="st-lvl">1</b></span>
      <span id="st-sch-label">🏛️<b id="st-sch">Mud Wall</b></span>
    </div>
  </div>
  <div id="tabs">
    <button class="t on" data-tab="gather">🪨 Gather</button>
    <button class="t" data-tab="craft">🔨 Craft</button>
    <button class="t" data-tab="build">🧱 Build</button>
    <button class="t" data-tab="skills">⚡ Skills</button>
    <button class="t" data-tab="talents">🏰 Talents</button>
  </div>
  <div id="content">
    <!-- GATHER -->
    <div class="pane on" id="gather-pane">
      <div class="gs"><span class="gl" id="g-skill">Gathering Lv.1</span></div>
      <div class="g-res" id="g-res"></div>
      <div id="gather-zone">
        <div class="big-icon" id="g-icon">🟤</div>
        <div class="hint" id="g-hint">Tap anywhere to gather Mud</div>
        <div class="sub" id="g-sub">+1 per tap</div>
        <div class="yield" id="g-yield"></div>
      </div>
      <div class="g-upgs" id="g-upgs"></div>
    </div>
    <!-- CRAFT -->
    <div class="pane" id="craft-pane">
      <div class="gs"><span class="gl" id="c-skill">Crafting Lv.1</span></div>
      <div class="c-mat" id="c-mat"></div>
      <div class="c-recipes" id="c-recipes"></div>
      <div id="craft-zone">
        <div class="big-icon" id="c-icon">🧱</div>
        <div class="hint" id="c-hint">Select a recipe above</div>
        <div class="sub" id="c-sub">Then tap here to craft</div>
        <div class="cbar" id="c-bar" style="display:none"><div class="cf" id="c-fill" style="width:0%"></div></div>
      </div>
      <div class="c-upgs" id="c-upgs"></div>
    </div>
    <!-- BUILD -->
    <div class="pane" id="build-pane">
      <canvas id="bc"></canvas>
      <div id="bsch"></div>
      <button id="bupg-toggle">⬆️</button>
      <div id="bupg-panel"></div>
      <div id="bhud">
        <div class="sn" id="bhud-name">🧱 Mud Wall</div>
        <div class="pt" id="bhud-progress">Row 0/5</div>
        <div class="ah" id="bhud-action">👉 Tap <span class="tc">0/4</span></div>
        <div class="row" id="bhud-row"></div>
      </div>
    </div>
    <!-- SKILLS -->
    <div class="pane" id="skills-pane">
      <div class="skills-scroll">
        <div id="skills-list"></div>
        <div id="milestones-area"></div>
        <div id="skill-upgs-area" class="su"></div>
      </div>
    </div>
    <!-- TALENTS -->
    <div class="pane" id="talents-pane">
      <div class="talents-scroll">
        <div class="talents-grid" id="talents-grid"></div>
      </div>
    </div>
  </div>
</div>
<div id="notif"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  BABEL — Full version with Skills, Talents, Milestones + big walls
// ═══════════════════════════════════════════════════════════════════════

;(() => {
'use strict';

// ─── DATA ──────────────────────────────────────────────────────────────

const RES = [
  { id:'mud',n:'Mud',i:'🟤',y:1},{id:'gravel',n:'Gravel',i:'🪨',y:1},
  { id:'sand',n:'Sand',i:'🏖️',y:1},{id:'clay',n:'Clay',i:'🧱',y:1},
  { id:'water',n:'Water',i:'💧',y:1},{id:'straw',n:'Straw',i:'🌾',y:1},
  { id:'lime',n:'Lime',i:'🪨',y:1},{id:'stone',n:'Stone',i:'⛰️',y:1},
];

const MAT = [
  { id:'mortar',n:'Mortar',i:'🧴',t:3,r:{sand:2,water:1,lime:1},d:'Mix'},
  { id:'mudBrick',n:'Mud Brick',i:'🧱',t:4,r:{mud:3,straw:1},d:'Mud→Dry'},
  { id:'firedBrick',n:'Fired Brick',i:'🔥',t:4,r:{clay:2,sand:1,water:1},d:'Fire'},
  { id:'stoneBlock',n:'Stone Block',i:'🗿',t:5,r:{stone:3},d:'Quarry→Polish'},
  { id:'reinforcedBrick',n:'Reinf.Brick',i:'⚔️',t:5,r:{firedBrick:1,stone:1,lime:1},d:'Reinforce'},
  { id:'glazedBrick',n:'Glazed Brick',i:'✨',t:6,r:{firedBrick:1,sand:2,water:1},d:'Glaze'},
  { id:'megalith',n:'Megalith',i:'🏛️',t:8,r:{stoneBlock:2,reinforcedBrick:1},d:'Mega'},
];

// BIG structures
const SCH = [
  { id:'mudWall',n:'Mud Wall',i:'🧱',r:5,bpr:20,bk:'mudBrick',mo:'mortar',d:'Big mud wall',req:null },

// ─── HELPERS ──────────────────────────────────────────────────────────

function curSch(){return SCH[S.con.schIdx]}
function uL(id){return S.upg[id]||0}
function uV(id){return uL(id)}
function tL(id){return S.tal[id]||0}
function msBought(){return S._msBought||0}
function allUpg(){return[...UPG_GOLD,...UPG_RES,...UPG_SKILL_GATHERING,...UPG_SKILL_CRAFTING,...UPG_SKILL_BUILDING,...UPG_SKILL_GENERAL]}

function bTaps(){return Math.max(1,4-uV('b1')-uV('gb1')-tL('scaffold')*0-(msBought()>=75?3:0)-(uV('gb5')>0?1:0)-uV('sb1'))}
function mTaps(){return Math.max(1,5-uV('b2')-uV('gb2')-tL('scaffold')*0-(msBought()>=75?3:0)-(uV('gb5')>0?1:0)-uV('sb1'))}
function bBatch(){return 1+uV('b3')+uV('gb3')+uV('sb2')}
function cTaps(id){const m=MAT.find(x=>x.id===id);return m?Math.max(1,m.t-uV('c1')-uV('gc1')-tL('kiln')*0-(msBought()>=75?3:0)):3}
function cBatch(){return 1+uV('c2')+uV('gc2')+uV('rc2')+uV('sc2')}

function gYield(id){
  const r=RES.find(x=>x.id===id);if(!r)return 1;
  let y=r.y;y*=Math.pow(2,uL('g1')+uL('gg1'));y+=uL('g2')+uL('gg2');y+=(uL('g3')+uL('gg3'))*2;
  // Resource upgrades
  const rm=uL('rm1')*0.2; // per level
  const resMult={mud:uL('rm1')*0.2,sand:uL('rm2')*0.2,clay:uL('rm3')*0.2,stone:uL('rm4')*0.2,water:uL('rm6')*0.5};
  y*=1+(resMult[id]||0);
  y*=1+uL('rm5')*0.5; // all earth
  // Skill
  y*=1+S.skills.gathering.lv*0.1;
  // Talent
  y*=1+tL('quarry')*0.2;
  // Milestones
  if(msBought()>=5)y+=1;if(msBought()>=50)y*=3;if(msBought()>=250)y*=5;
  y*=1+(msBought()>=200?4:0);
  // General
  if(uV('sg1')>0)y*=2; // Expert Gatherer
  return Math.max(1,Math.floor(y));
}

function goldMult(){
  let m=1;
  if(uV('sx2')>0)m*=2;
  if(msBought()>=10)m*=2;if(msBought()>=125)m*=2;if(msBought()>=300)m*=5;
  m*=1+tL('design')*0.1;
  m*=1+uV('sg2')*1; // Master Prospector makes resources worth 2x when selling... nah
  return m;
}

function xpMult(){
  let m=1;
  if(msBought()>=25)m*=2;if(msBought()>=200)m*=4;
  m*=1+tL('design')*0.1;
  if(uV('sx3')>0)m*=3;
  return m;
}

function allMult(){
  let m=1;
  if(msBought()>=400)m*=10;if(msBought()>=500)m*=20;
  m*=1+tL('foundation')*0.1;
  return m;
}

function autoRate(id){
  const map={g4:'mud',g5:'sand',g6:'clay',g7:'stone'};
  for(const[u,res]of Object.entries(map)){if(id===res)return uL(u)*(u==='g5'?0.5:u==='g7'?0.3:1)+(uL('gg4')*1||0)+(uL('gg5')*0.5||0)+(uL('gg6')*1||0)+(uL('gg7')*0.3||0)}
  return 0;
}

// XP for next level
function xpNext(lv){return Math.floor(80*lv*(1+lv*0.12))}
function xpToLevel(xp){let l=1;while(xp>=xpNext(l)){xp-=xpNext(l);l++}return{lv:l,xpLeft:xp,xpNext:xpNext(l)}}

function earnXP(skill,base){
  const x=Math.floor(base*xpMult()*allMult());
  if(skill==='general'){S.skills.general.xp+=x;recalcSkill('general')}
  else{S.skills[skill].xp+=x;recalcSkill(skill);S.skills.general.xp+=Math.floor(x*0.5);recalcSkill('general')}
}
function recalcSkill(id){
  const s=S.skills[id];const r=xpToLevel(s.xp);s.lv=r.lv;
}

// ─── AUTO-SELECT CRAFT ───────────────────────────────────────────────

function autoSelectCraft(){
  const s=curSch();if(!s)return MAT[0].id;
  const haveB=S.mat[s.bk]||0,haveM=S.mat[s.mo]||0;
  const half=Math.ceil(s.r*s.bpr/2);
  if(haveB<half)return s.bk;
  if(haveM<half)return s.mo;
  if(S._selCraft&&MAT.find(m=>m.id===S._selCraft))return S._selCraft;
  return MAT[0].id;
}

// ─── CANVAS ───────────────────────────────────────────────────────────

const canvas=document.getElementById('bc');
const ctx=canvas.getContext('2d');
let cW=0,cH=0,rP=false;

function resizeCanvas(){
  const p=document.getElementById('build-pane');
  const rect=p.getBoundingClientRect();
  if(rect.w<10||rect.h<10){rP=true;return}
  const dpr=window.devicePixelRatio||1;
  canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  cW=rect.width;cH=rect.height;
  canvas.style.width=rect.width+'px';canvas.style.height=rect.height+'px';rP=false;
}

function draw(){
  const dpr=window.devicePixelRatio||1;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  if(cW<20||cH<20){if(rP||cW<20)resizeCanvas();if(cW<20||cH<20)return}
  const w=cW,h=cH;
  const g=ctx.createLinearGradient(0,0,0,h);
  g.addColorStop(0,'#1a0f0a');g.addColorStop(0.4,'#2a1508');g.addColorStop(0.7,'#3d2010');g.addColorStop(1,'#4a2512');
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  if(S.con.schIdx>=3){ctx.fillStyle='rgba(255,255,240,0.12)';for(let i=0;i<60;i++){const sx=(i*137.5+53)%w,sy=(i*97.3+17)%(h*0.3);ctx.beginPath();ctx.arc(sx,sy,0.6,0,Math.PI*2);ctx.fill()}}
  ctx.fillStyle='#2c1810';ctx.fillRect(0,h-40,w,40);
  ctx.fillStyle='#3d2010';ctx.fillRect(0,h-40,w,2);
  const s=curSch();if(!s)return;
  const bpr=s.bpr,rows=s.r;
  const bW=Math.min(48,Math.max(14,(w-30)/(bpr+0.3)));
  const bH=bW*0.45,mH=bW*0.12,gap=2;
  const wallW=bpr*bW+(bpr-1)*gap;
  const rowH=bH+mH;
  const wallH=rows*rowH;
  const ox=Math.max(8,(w-wallW)/2);
  const oy=h-42-wallH;
  if(oy<5){const scale=(h-50)/(wallH+10);const bw2=bW*scale;const bh2=bH*scale;oy=h-42-wallH*scale;
    // Simplified - just draw at scaled size if too tall
  }
  const rowsData=S.con.rows;
  const cols=BC[s.bk]||BC.mudBrick;
  const mCols=BC[s.mo==='glazedBrick'?'glazedMortar':'mortar'];
  for(let r=0;r<rowsData.length;r++){
    const row=rowsData[r],y=oy+r*rowH;
    if(y<h&&y>-rowH){
      ctx.fillStyle='rgba(255,255,255,0.05)';ctx.font='6px sans-serif';ctx.textAlign='right';
      ctx.fillText(''+(r+1),ox-3,y+bH/2+2);
      for(let b=0;b<bpr;b++){
        if(ox+b*(bW+gap)+bW<0||ox+b*(bW+gap)>w)continue;
        const bx=ox+b*(bW+gap);
        const brick=row.bricks[b];
        if(brick.st==='d'){drawBrick(bx,y,bW,bH,1,false,cols)}
        else if(brick.st==='p'){
          const f=Math.min(1,(brick.pr||0)/bTaps());
          ctx.globalAlpha=0.1;drawBrick(bx,y,bW,bH,1,true,cols);ctx.globalAlpha=1;
          const slideY=y-(1-f)*25;
          ctx.shadowColor='rgba(232,200,122,'+(0.1+0.12*f)+')';ctx.shadowBlur=6;
          drawBrick(bx,slideY,bW,bH,Math.max(0.3,f),false,cols);ctx.shadowBlur=0;
        }else if(brick.st==='m'){
          drawBrick(bx,y,bW,bH,1,false,cols);
          const mf=Math.min(1,(brick.mp||0)/mTaps());
          ctx.fillStyle='rgba('+(mf>0.5?'180,160,130':'160,140,110')+','+(0.15+0.4*mf)+')';
          ctx.fillRect(bx,y-mH,bW,mH);
          if(mf>0.3){ctx.fillStyle='rgba(200,180,150,0.15)';for(let s=0;s<2;s++)ctx.fillRect(bx+2+s*8,y-mH+1,6,1)}
          if(mf>=1){ctx.fillStyle=mCols.s;ctx.fillRect(bx,y-mH,bW,mH);ctx.strokeStyle=mCols.e;ctx.lineWidth=0.3;ctx.strokeRect(bx,y-mH,bW,mH)}
        }else if(brick.st==='e'){ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.3;ctx.strokeRect(bx,y,bW,bH)}
      }
      if(r<rowsData.length-1){
        ctx.fillStyle=mCols.m;ctx.fillRect(ox,y+bH,wallW,mH);
        ctx.fillStyle=mCols.e;
        for(let b=0;b<bpr;b++){const bx=ox+b*(bW+gap);ctx.fillRect(bx+1,y+bH+1,bW-2,mH-1)}
      }
    }
  }
  for(let r=rowsData.length;r<rows;r++){const y=oy+r*rowH;
    for(let b=0;b<bpr;b++){const bx=ox+b*(bW+gap);
      ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.3;ctx.strokeRect(bx,y,bW,bH)}}
  ctx.fillStyle='#4a3020';ctx.fillRect(ox-10,h-42,wallW+20,3);
  ctx.fillStyle='rgba(60,80,40,0.12)';
  for(let i=0;i<10;i++){const gx=(i*53+17)%w;ctx.beginPath();ctx.moveTo(gx,h-40);ctx.lineTo(gx+3,h-46);ctx.lineTo(gx-3,h-46);ctx.fill()}
}
function drawBrick(x,y,w,h,prog,ghost,cols){
  if(ghost){ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=0.3;ctx.setLineDash([2,2]);ctx.strokeRect(x,y,w,h);ctx.setLineDash([]);return}
  const g=ctx.createLinearGradient(x,y,x,y+h);
  g.addColorStop(0,cols.s);g.addColorStop(0.5,cols.m);g.addColorStop(1,cols.e);
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=0.3;ctx.strokeRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,0,0,0.05)';ctx.lineWidth=0.2;
  ctx.beginPath();ctx.moveTo(x+1,y+h*0.3);ctx.lineTo(x+w-1,y+h*0.3);
  ctx.moveTo(x+1,y+h*0.6);ctx.lineTo(x+w-1,y+h*0.6);ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(x+1,y+1,w-2,h*0.15);
}

// ─── BUILD ─────────────────────────────────────────────────────────────

function tapBuild(){
  const s=curSch();if(!s)return;
  const rows=S.con.rows,ri=S.con.curRow;
  if(ri>=rows.length)return;
  const row=rows[ri],bpr=s.bpr;
  let bi=-1;for(let b=0;b<bpr;b++){const st=row.bricks[b].st;if(st==='e'||st==='p'||st==='m'){bi=b;break}}
  if(bi===-1){if(ri<rows.length-1){S.con.curRow++;S.con.phase='brick';return tapBuild()}return}
  const brick=row.bricks[bi],bkType=s.bk,moType=s.mo;
  if(S.con.phase==='brick'){
    if(brick.st==='e'){const batch=bBatch();if((S.mat[bkType]||0)<batch){notify('Need '+(MAT.find(x=>x.id===bkType)||{}).n+'!');return}
      S.mat[bkType]-=batch;brick.st='p';brick.pr=0;S.con.bProg=0}
    if(brick.st==='p'){brick.pr=(brick.pr||0)+1;S.stat.taps++;S.stat.bricks++;S.stat.gold+=1*goldMult()*allMult();earnXP('building',1);
      S.con.bProg=brick.pr;
      if(brick.pr>=bTaps()){brick.st='m';brick.mp=0;S.con.phase='mortar';S.con.mProg=0;sparkle('🧱')}
      updateHUD();updateUIstats();return}
  }
  if(S.con.phase==='mortar'&&brick.st==='m'){
    if((S.mat[moType]||0)<1){notify('Need '+(MAT.find(x=>x.id===moType)||{}).n+'!');return}
    brick.mp=(brick.mp||0)+1;S.stat.taps++;S.stat.mortars++;S.stat.gold+=1*goldMult()*allMult();earnXP('building',1);
    S.con.mProg=brick.mp;
    if(brick.mp>=mTaps()){S.mat[moType]--;brick.st='d';S.con.phase='brick';
      const allDone=row.bricks.every(b=>b.st==='d');
      if(allDone){if(ri<rows.length-1){S.con.curRow++;S.con.phase='brick'}else{
        notify('🎉 '+s.n+' complete!');if(S.con.schIdx<SCH.length-1){S.con.schIdx++;initRows();notify('📐 Now building: '+curSch().n)}
        updateUI();return}}}
    updateHUD();updateUIstats();return}
}

// ─── GATHER ────────────────────────────────────────────────────────────

function gather(id){
  const y=Math.floor(gYield(id)*allMult());
  S.res[id]=(S.res[id]||0)+y;S.stat.taps++;S.stat.gold+=1*goldMult()*allMult();earnXP('gathering',1);
  const idx=RES.findIndex(r=>r.id===id);if(idx>=0)S.gFocus=(idx+1)%RES.length;
  updateUI();
  const yel=document.getElementById('g-yield');
  if(yel){yel.textContent='+'+y+' 🟤';yel.classList.remove('pop');void yel.offsetWidth;yel.classList.add('pop')}
  const fl=document.createElement('div');fl.className='change';fl.textContent='+🪙'+Math.floor(goldMult()*allMult());
  const zone=document.getElementById('gather-zone');
  fl.style.left=(30+Math.random()*40)+'%';fl.style.top=(30+Math.random()*40)+'%';
  zone.appendChild(fl);setTimeout(()=>fl.remove(),700);
}
function gatherFocus(){return RES[S.gFocus%RES.length]}

// ─── CRAFT ────────────────────────────────────────────────────────────

function craft(matId){
  const mat=MAT.find(x=>x.id===matId);if(!mat)return;
  const taps=cTaps(matId);
  if(!S.cp[matId])S.cp[matId]={t:0,a:false};
  const p=S.cp[matId];
  if(!p.a){
    for(const[rid,q]of Object.entries(mat.r)){const src=S.res[rid]!==undefined?S.res:S.mat;if((src[rid]||0)<q){notify('Need '+q+'x '+rid);return}}
    for(const[rid,q]of Object.entries(mat.r)){if(S.res[rid]!==undefined)S.res[rid]-=q;else S.mat[rid]-=q}
    p.a=true;p.t=0}
  p.t++;S.stat.taps++;S.stat.gold+=1*goldMult()*allMult();earnXP('crafting',1);
  sparkle('🔨');
  if(p.t>=taps){const batch=cBatch();S.mat[matId]=(S.mat[matId]||0)+batch;p.a=false;p.t=0;notify('✅ +'+batch+' '+mat.n)}
  updateUI()
}

// ─── AUTO ──────────────────────────────────────────────────────────────

function autoTick(){
  for(const r of RES){const rate=autoRate(r.id);if(rate>0)S.res[r.id]=(S.res[r.id]||0)+rate/10}
}

// ─── SCHEMATIC ─────────────────────────────────────────────────────────

function canSch(idx){if(idx===0)return true;const s=SCH[idx];if(!s||!s.req)return false;for(const[m,q]of Object.entries(s.req)){if((S.mat[m]||0)<q)return false}return true}
function selectSch(idx){if(idx===S.con.schIdx)return;if(!canSch(idx)){notify('Requirements not met!');return}S.con.schIdx=idx;initRows();updateUI();notify('📐 Now building: '+SCH[idx].n)}

// ─── UPGRADE ──────────────────────────────────────────────────────────

function buyUpg(id){
  const all=[...UPG_GOLD,...UPG_RES,...UPG_SKILL_GATHERING,...UPG_SKILL_CRAFTING,...UPG_SKILL_BUILDING,...UPG_SKILL_GENERAL];
  const u=all.find(x=>x.id===id);if(!u)return;
  const l=uL(id);if(l>=u.L)return;
  if(u.req){for(const[m,q]of Object.entries(u.req)){if((S.mat[m]||0)<q){notify('Need '+q+'x '+m);return}}}
  if(u.reqLv!==undefined){
    const sklMap={sg1:'gathering',sg2:'gathering',sg3:'gathering',sc1:'crafting',sc2:'crafting',sc3:'crafting',sb1:'building',sb2:'building',sb3:'building',sx1:'general',sx2:'general',sx3:'general'};
    const sk=sklMap[id]||'general';
    if((S.skills[sk].lv||0)<u.reqLv){notify('Need '+sk+' Lv.'+u.reqLv);return}
  }
  let cost;
  if(u.cost!==undefined){
    // Resource cost
    if(typeof u.cost==='object'){for(const[rid,q]of Object.entries(u.cost)){if((S.res[rid]||0)<q){notify('Need '+q+'x '+rid);return}}}
    cost=Math.floor((u.b||0)*Math.pow(u.m||1,l));
    if(u.cost&&typeof u.cost==='object'){for(const[rid,q]of Object.entries(u.cost)){S.res[rid]-=q*Math.pow(u.cm||1,l)}}
  }
  if(u.b!==undefined&&!u.cost){cost=Math.floor(u.b*Math.pow(u.m,l));if((S.stat.gold||0)<cost){notify('Need 🪙'+cost);return};S.stat.gold-=cost}
  S.upg[id]=l+1;
  notify('⬆️ '+u.n+' Lv.'+S.upg[id]+'!');
  updateUI()
}

function buyMilestone(idx){
  const m=MILESTONES[idx];if(!m)return;
  if(S.stat.taps<m.lv){notify('Need '+m.lv+' taps!');return}
  if(S._msBought===undefined)S._msBought=0;
  S._msBought++;notify('🏅 Unlocked: '+m.n+'!');updateUI()
}

function buyTalent(id){
  const t=TALENTS.find(x=>x.id===id);if(!t)return;
  const l=tL(id);if(l>=t.L)return;
  const sk=t.reqSkl||'general';const reqLv=t.reqLv+t.reqLvStep*l;
  if((S.skills[sk].lv||0)<reqLv){notify('Need '+sk+' Lv.'+reqLv);return}
  const cost=Math.floor(t.cb*Math.pow(t.cm,l));
  if((S.stat.gold||0)<cost){notify('Need 🪙'+cost);return}
  S.stat.gold-=cost;S.tal[id]=l+1;
  notify('🏰 '+t.n+' Lv.'+S.tal[id]+'!');updateUI()
}

// ─── NOTIFY ────────────────────────────────────────────────────────────

let nTimer=null;
function notify(msg){const el=document.getElementById('notif');el.textContent=msg;el.classList.add('sh');clearTimeout(nTimer);nTimer=setTimeout(()=>el.classList.remove('sh'),1800)}

// ─── SPARKLE ──────────────────────────────────────────────────────────

function sparkle(emoji='✨'){
  for(let i=0;i<3;i++){const el=document.createElement('div');el.className='prtcl';el.textContent=emoji;
    el.style.left=(30+Math.random()*40)+'vw';el.style.top=(30+Math.random()*40)+'vh';
    document.body.appendChild(el);setTimeout(()=>el.remove(),600)}

// ─── HUD ──────────────────────────────────────────────────────────────

function updateHUD(){
  const s=curSch();if(!s)return;
  document.getElementById('bhud-name').textContent=s.i+' '+s.n;
  const ri=S.con.curRow,bpr=s.bpr;
  if(!S.con.rows[ri])return;
  const doneInRow=S.con.rows[ri].bricks.filter(b=>b.st==='d').length;
  document.getElementById('bhud-progress').textContent='Row '+(ri+1)+'/'+s.r+' • '+doneInRow+'/'+bpr;
  const tap=S.con.phase==='brick'?S.con.bProg+1:S.con.mProg+1;
  const max=S.con.phase==='brick'?bTaps():mTaps();
  const bs=['Move','Push ⅓','Push ⅔','Set'];
  const ms=['Scoop','Plop','L-slap','R-slap','Flat'];
  const steps=S.con.phase==='brick'?bs:ms;
  const desc=steps[Math.min(tap-1,steps.length-1)]||'Done';
  const icon=S.con.phase==='brick'?'🧱':'🧴';
  document.getElementById('bhud-action').innerHTML=icon+' '+desc+' <span class="tc">'+tap+'/'+max+'</span>';
  const re=document.getElementById('bhud-row');
  const ci=curBrickIdx();
  re.innerHTML=S.con.rows[ri].bricks.map((b,i)=>'<span class="dot'+(b.st==='d'?' done':'')+(i===ci?' cur':'')+'"></span>').join('');
}
function curBrickIdx(){const s=curSch();if(!s||!S.con.rows[S.con.curRow])return -1;const row=S.con.rows[S.con.curRow];for(let b=0;b<s.bpr;b++){if(row.bricks[b].st!=='d')return b}return -1}

// ─── TABS ──────────────────────────────────────────────────────────────

function switchTab(tabId){
  document.querySelectorAll('.t').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  document.querySelector('.t[data-tab="'+tabId+'"]').classList.add('on');
  document.getElementById(tabId+'-pane').classList.add('on');
  if(tabId==='build')requestAnimationFrame(()=>resizeCanvas());
}

// ─── SAVE ─────────────────────────────────────────────────────────────

function save(){try{localStorage.setItem('babel_save',JSON.stringify(S))}catch(e){}}
function load(){
  try{const d=localStorage.getItem('babel_save');if(d){Object.assign(S,JSON.parse(d));
    if(!S.con.rows||S.con.rows.length===0)initRows();if(!S.cp)S.cp={};if(!S.skills)S.skills={gathering:{xp:0,lv:1},crafting:{xp:0,lv:1},building:{xp:0,lv:1},general:{xp:0,lv:1}};
    if(!S.tal)S.tal={};if(!S._msBought)S._msBought=0;return true}
  }catch(e){}return false
}

// ─── INIT ─────────────────────────────────────────────────────────────

function init(){
  document.querySelectorAll('.t').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
  document.getElementById('gather-zone').addEventListener('click',()=>gather(gatherFocus().id));
  document.getElementById('craft-zone').addEventListener('click',()=>{const s=S._selCraft||MAT[0].id;if(s)craft(s)});
  canvas.addEventListener('click',()=>tapBuild());
  document.getElementById('bupg-toggle').addEventListener('click',()=>document.getElementById('bupg-panel').classList.toggle('sh'));
  document.addEventListener('keydown',e=>{if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;if(e.key===' '||e.key==='Enter'){e.preventDefault();tapBuild()}
    if(e.key==='1')switchTab('gather');if(e.key==='2')switchTab('craft');if(e.key==='3')switchTab('build');if(e.key==='4')switchTab('skills');if(e.key==='5')switchTab('talents')});
  if(!load())initRows();
  window.addEventListener('resize',()=>resizeCanvas());
  resizeCanvas();updateUI();
  setInterval(()=>{autoTick();S.tick++;if(S.tick%5===0)updateUI()},100);
  setInterval(save,5000);
  (function loop(){draw();requestAnimationFrame(loop)})();
  console.log('🗼 Babel loaded!');
}

window.G={
  init,gather,craft,tapBuild,buyUpg,
  selCraft(id){S._selCraft=id;updateUI()},
  selSch:selectSch,upg:buyUpg,
  buyMs(idx){buyMilestone(idx)},
  buyTalent,
};
})();
document.addEventListener('DOMContentLoaded',()=>{G.init()});
</script>
</body>
</html>
